
<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:700px;background:#0d0d0d;border-radius:6px;display:block;">
  <defs>
    <style>
      .mono{font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:12px;}
      .ok{fill:#55ff55;}
      .warn{fill:#ffaa00;}
      .dim{fill:#444;}
      .white{fill:#d0d0d0;}
      .blue{fill:#77aaff;}
      .label{fill:#888;}

      .row{opacity:0;}
      .r1{animation:fade 0.1s 0.2s forwards;}
      .r2{animation:fade 0.1s 0.4s forwards;}
      .r3{animation:fade 0.1s 0.55s forwards;}
      .r4{animation:fade 0.1s 0.7s forwards;}
      .r5{animation:fade 0.1s 0.9s forwards;}
      .r6{animation:fade 0.1s 1.1s forwards;}
      .r7{animation:fade 0.1s 1.25s forwards;}
      .r8{animation:fade 0.1s 1.45s forwards;}
      .r9{animation:fade 0.1s 1.65s forwards;}
      .r10{animation:fade 0.1s 1.85s forwards;}
      .r11{animation:fade 0.1s 2.05s forwards;}
      .r12{animation:fade 0.1s 2.25s forwards;}
      .r13{animation:fade 0.1s 2.45s forwards;}
      .r14{animation:fade 0.1s 2.65s forwards;}
      .r15{animation:fade 0.1s 2.85s forwards;}

      .post{opacity:0;animation:fade 0.3s 3.2s forwards;}
      .cursor{animation:blink 1s 3.3s step-end infinite;opacity:0;}
      @keyframes fade{to{opacity:1;}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    </style>
  </defs>

  <rect width="700" height="400" fill="#0d0d0d"/>

  <g class="row r1">
    <text x="24" y="30" class="mono dim">[</text><text x="34" y="30" class="mono ok"> OK </text><text x="64" y="30" class="mono dim">]</text>
    <text x="80" y="30" class="mono white">Reached target Local File Systems</text>
  </g>
  <g class="row r2">
    <text x="24" y="48" class="mono dim">[</text><text x="34" y="48" class="mono ok"> OK </text><text x="64" y="48" class="mono dim">]</text>
    <text x="80" y="48" class="mono white">Mounted /dev/sda1 on /boot</text>
  </g>
  <g class="row r3">
    <text x="24" y="66" class="mono dim">[</text><text x="34" y="66" class="mono ok"> OK </text><text x="64" y="66" class="mono dim">]</text>
    <text x="80" y="66" class="mono white">Mounted /dev/sda2 on /</text>
  </g>
  <g class="row r4">
    <text x="24" y="84" class="mono dim">[</text><text x="34" y="84" class="mono ok"> OK </text><text x="64" y="84" class="mono dim">]</text>
    <text x="80" y="84" class="mono white">Started Network Manager</text>
  </g>
  <g class="row r5">
    <text x="24" y="102" class="mono dim">[</text><text x="34" y="102" class="mono warn">WARN</text><text x="64" y="102" class="mono dim">]</text>
    <text x="80" y="102" class="mono warn">systemd-resolved: fallback DNS active</text>
  </g>
  <g class="row r6">
    <text x="24" y="120" class="mono dim">[</text><text x="34" y="120" class="mono ok"> OK </text><text x="64" y="120" class="mono dim">]</text>
    <text x="80" y="120" class="mono white">Started OpenSSH Daemon</text>
  </g>
  <g class="row r7">
    <text x="24" y="138" class="mono dim">[</text><text x="34" y="138" class="mono ok"> OK </text><text x="64" y="138" class="mono dim">]</text>
    <text x="80" y="138" class="mono white">Reached target Network</text>
  </g>
  <g class="row r8">
    <text x="24" y="156" class="mono dim">[</text><text x="34" y="156" class="mono ok"> OK </text><text x="64" y="156" class="mono dim">]</text>
    <text x="80" y="156" class="mono white">Loading module: </text><text x="210" y="156" class="mono blue">cpp_toolchain</text>
  </g>
  <g class="row r9">
    <text x="24" y="174" class="mono dim">[</text><text x="34" y="174" class="mono ok"> OK </text><text x="64" y="174" class="mono dim">]</text>
    <text x="80" y="174" class="mono white">Loading module: </text><text x="210" y="174" class="mono blue">lua_runtime</text>
  </g>
  <g class="row r10">
    <text x="24" y="192" class="mono dim">[</text><text x="34" y="192" class="mono ok"> OK </text><text x="64" y="192" class="mono dim">]</text>
    <text x="80" y="192" class="mono white">Loading module: </text><text x="210" y="192" class="mono blue">dotnet_sdk</text>
  </g>
  <g class="row r11">
    <text x="24" y="210" class="mono dim">[</text><text x="34" y="210" class="mono ok"> OK </text><text x="64" y="210" class="mono dim">]</text>
    <text x="80" y="210" class="mono white">Loading module: </text><text x="210" y="210" class="mono blue">winapi_bridge</text>
  </g>
  <g class="row r12">
    <text x="24" y="228" class="mono dim">[</text><text x="34" y="228" class="mono ok"> OK </text><text x="64" y="228" class="mono dim">]</text>
    <text x="80" y="228" class="mono white">Loading module: </text><text x="210" y="228" class="mono blue">reverse_engineering</text>
  </g>
  <g class="row r13">
    <text x="24" y="246" class="mono dim">[</text><text x="34" y="246" class="mono ok"> OK </text><text x="64" y="246" class="mono dim">]</text>
    <text x="80" y="246" class="mono white">Loading module: </text><text x="210" y="246" class="mono blue">gamehacking</text>
  </g>
  <g class="row r14">
    <text x="24" y="264" class="mono dim">[</text><text x="34" y="264" class="mono ok"> OK </text><text x="64" y="264" class="mono dim">]</text>
    <text x="80" y="264" class="mono white">Reached target Multi-User System</text>
  </g>
  <g class="row r15">
    <text x="24" y="282" class="mono dim">[</text><text x="34" y="282" class="mono ok"> OK </text><text x="64" y="282" class="mono dim">]</text>
    <text x="80" y="282" class="mono white">cloxy profile loaded — all systems nominal</text>
  </g>

  <line x1="24" y1="298" x2="676" y2="298" stroke="#1e1e1e" stroke-width="1" class="post"/>

  <g class="post">
    <text x="24" y="320" class="mono" fill="#55ff55" font-weight="bold">cloxy</text>
    <text x="66" y="320" class="mono dim">@</text>
    <text x="76" y="320" class="mono blue" font-weight="bold">archbox</text>
    <text x="130" y="320" class="mono" fill="#ffaa00"> ~ </text>
    <text x="154" y="320" class="mono" fill="#ff99aa">(main)</text>
    <text x="204" y="320" class="mono" fill="#ff5555"> ❯ </text>
    <rect x="230" y="308" width="8" height="14" fill="#d0d0d0" class="cursor"/>
  </g>

  <g class="post">
    <text x="24" y="352" class="mono label">email </text>
    <text x="72" y="352" class="mono dim">→ </text>
    <text x="90" y="352" class="mono blue">cloxy@azura.uno</text>
    <text x="290" y="352" class="mono label">  discord </text>
    <text x="356" y="352" class="mono dim">→ </text>
    <text x="374" y="352" class="mono blue">cloxyowo</text>
  </g>
</svg>
